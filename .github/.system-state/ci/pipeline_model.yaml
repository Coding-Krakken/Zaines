meta:
  id: pipeline-model
  version: 1.0.0
  status: draft
  owner: devops-engineer
  date: 2026-05-13

pipeline:
  trigger:
    - pull_request
    - merge_to_main

stages:
  - name: validate-models
    required: true
    checks:
      - yaml-schema-validation
      - required-model-presence
      - model-cross-reference-check

  - name: quality-gates
    required: true
    checks:
      - eslint
      - prettier-check
      - typescript-strict-typecheck
      - unit-tests
      - coverage-threshold-80

  - name: security-gates
    required: true
    checks:
      - secret-scan
      - dependency-vulnerability-scan
      - policy-check-no-card-data-handling

  - name: performance-gates
    required: true
    checks:
      - lighthouse-ci
      - web-vitals-budget-check

  - name: release-readiness
    required: on_main_only
    checks:
      - e2e-critical-journeys
      - rollback-rehearsal-checklist
      - observability-dashboard-health

environments:
  - name: pr-preview
    deploy: automatic
    required_checks:
      - validate-models
      - quality-gates
  - name: staging
    deploy: automatic-on-main
    required_checks:
      - quality-gates
      - security-gates
      - performance-gates
  - name: production
    deploy: manual-approval
    required_checks:
      - release-readiness
      - quality-director-approval

failure_policy:
  block_merge_if_any_required_stage_fails: true
  flaky_test_retries: 1
  quarantine_requires_issue: true
