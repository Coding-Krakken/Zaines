meta:
  id: canonical-api-contracts
  version: 1.0.0
  status: active
  owner: solution-architect
  date: 2026-05-11

contracts:
  - name: create_payment_intent
    method: POST
    path: /api/payments/create-intent
    request_schema:
      bookingId: string
      amount: number
    response_schema:
      success:
        status: 200
        body:
          clientSecret: string
          paymentIntentId: string
      error:
        status: 400|401|403|404|409|500|503
        body:
          errorCode: string
          message: string
          retryable: boolean
          correlationId: string

  - name: payment_webhook
    method: POST
    path: /api/payments/webhook
    request_schema:
      stripeSignature: string
      event_type: enum[payment_intent.succeeded, payment_intent.payment_failed, payment_intent.canceled, charge.refunded]
    response_schema:
      success:
        status: 200
        body:
          received: boolean
      error:
        status: 400|500|503
        body:
          errorCode: string
          message: string
          retryable: boolean
          correlationId: string

  - name: finance_revenue_recognition_summary
    method: GET
    path: /api/admin/finance/revenue-recognition
    auth: staff_or_admin
    query_schema:
      startDate: string(date)
      endDate: string(date)
    response_schema:
      success:
        status: 200
        body:
          range:
            startDate: string
            endDate: string
          totals:
            grossRevenue: number
            deferredRevenue: number
            recognizedRevenue: number
            reversedRevenue: number
            excludedRevenue: number
          byRecognitionStatus: array
      error:
        status: 401|403|500
        body:
          errorCode: string
          message: string
          retryable: boolean
          correlationId: string
