meta:
  id: canonical-error-contracts
  version: 1.0.0
  status: active
  owner: security-engineer
  date: 2026-05-11

error_envelope:
  required_fields:
    - errorCode
    - message
    - retryable
    - correlationId
  forbidden_fields:
    - stack
    - raw_email
    - raw_phone
    - raw_message
    - card_number
    - cvc

errors:
  - code: REVENUE_RECOGNITION_VALIDATION_FAILED
    http_status: 400
    retryable: false
    message: Revenue recognition data is invalid.

  - code: REVENUE_RECOGNITION_IMPORT_FAILED
    http_status: 503
    retryable: true
    message: Revenue recognition import failed. Retry later.

  - code: REVENUE_RECOGNITION_PERIOD_INVALID
    http_status: 400
    retryable: false
    message: Accounting period range is invalid.

  - code: REVENUE_RECOGNITION_DATA_UNAVAILABLE
    http_status: 503
    retryable: true
    message: Revenue recognition data is temporarily unavailable.

  - code: REVENUE_RECOGNITION_EXPORT_FAILED
    http_status: 500
    retryable: true
    message: Failed to export revenue recognition report.
