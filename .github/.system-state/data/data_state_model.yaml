meta:
  id: canonical-data-state-model
  version: 1.0.0
  status: active
  owner: data-engineer
  date: 2026-05-11

persistence:
  payments:
    table: payments
    required_fields:
      - id
      - bookingId
      - amount
      - currency
      - status
      - revenueRecognitionMethod
      - recognitionStatus
      - servicePeriodStart
      - servicePeriodEnd
      - deferredRevenueAmount
      - recognizedRevenueAmount
      - taxTreatment
    indexes:
      - [status]
      - [recognitionStatus]
      - [servicePeriodStart]
      - [servicePeriodEnd]
      - [createdAt]

  stripe_events:
    table: stripe_events
    required_fields:
      - eventId
      - eventType
      - paymentId
      - payload
      - processed

derived_views:
  - name: revenue_recognition_period_summary
    source: payments
    grouping:
      - accounting_period
      - recognitionStatus
    metrics:
      - grossRevenue
      - deferredRevenue
      - recognizedRevenue
      - reversedRevenue
      - excludedRevenue

import_backfill:
  sources:
    - stripe payment intents
    - stripe charges
    - existing booking check-in/check-out dates
  idempotency_key:
    strategy: event_id_or_payment_id_hash
  validation_rules:
    - servicePeriodEnd >= servicePeriodStart
    - recognizedRevenueAmount >= 0
    - deferredRevenueAmount >= 0
