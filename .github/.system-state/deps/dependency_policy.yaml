meta:
  id: dependency-policy
  version: 1.0.0
  status: draft
  owner: tech-lead
  date: 2026-05-13

policy:
  max_new_dependencies_per_phase: 10
  default_action: deny_until_reviewed
  allow_only_with:
    - business_justification
    - alternative_considered
    - license_review
    - maintenance_signal_check
    - security_scan_pass

approved_patterns:
  ui:
    - tailwindcss
    - headless-ui
  state:
    - zustand
    - tanstack-query
  forms:
    - react-hook-form
    - zod
  observability:
    - sentry
    - vercel-analytics

forbidden_patterns:
  - duplicate_frameworks_for_same_concern
  - speculative_abstraction_libraries
  - direct_card_data_handling_libraries

license_guardrails:
  allow:
    - MIT
    - Apache-2.0
    - BSD-2-Clause
    - BSD-3-Clause
    - ISC
  deny:
    - GPL-3.0
    - AGPL-3.0

update_strategy:
  security:
    cadence: weekly
    auto_merge_patch: false
    require_ci_green: true
  routine:
    cadence: biweekly
    batch_updates: true

exception_process:
  required_approvers:
    - security-engineer
    - tech-lead
  record_location: .github/DECISIONS
  expiry_days: 90
