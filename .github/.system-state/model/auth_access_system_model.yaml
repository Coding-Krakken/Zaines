meta:
  id: auth-access-system-model
  version: 0.1.0
  status: draft
  owner: solution-architect
  date: 2026-05-13
  traceability_tags: [AUTH, TRUST, BOOKING, CONVERSION, SECURITY]

scope:
  domain: authentication-and-account-access
  in_scope:
    - provider capability detection and runtime-safe rendering
    - email-plus-password authentication
    - passwordless magic-link authentication
    - oauth authentication for configured providers
    - guest-to-account claim path for booking conversion
    - session visibility and revocation foundations
  out_of_scope:
    - passkey authentication
    - sms otp authentication

domain_entities:
  - name: AuthProviderCapability
    fields:
      id: enum[google, facebook, apple, microsoft, resend, credentials, guest]
      enabled: boolean
      kind: enum[oauth, passwordless, credentials, guest]
      display_name: string
      reason_disabled: string?

  - name: PasswordCredential
    fields:
      user_id: string
      password_hash: string
      password_updated_at: datetime
      failed_attempts: number
      locked_until: datetime?

  - name: GuestClaimIdentity
    fields:
      guest_id: string
      email: string
      booking_reference: string
      claim_status: enum[pending, claimed, expired]
      expires_at: datetime

state_machines:
  - name: AuthSignInFlow
    states:
      - idle
      - validating
      - authenticating
      - awaiting_verification
      - success
      - failed
    transitions:
      - from: idle
        to: validating
        guard:
          - user_submitted_credentials == true
      - from: validating
        to: authenticating
        guard:
          - input_valid == true
      - from: authenticating
        to: success
        guard:
          - provider_response in [ok, accepted]
      - from: authenticating
        to: awaiting_verification
        guard:
          - provider_response == verification_required
      - from: authenticating
        to: failed
        guard:
          - provider_response in [invalid_credentials, provider_error, rate_limited]
    forbidden_transitions:
      - from: idle
        to: success
        reason: authentication must include explicit validation and provider response

invariants:
  - id: INV-AUTH-001
    rule: auth provider actions are shown only when provider capability enabled is true.
    tags: [AUTH, TRUST]
  - id: INV-AUTH-002
    rule: password hashes are stored with one-way KDF output only; raw passwords are never persisted.
    tags: [AUTH, SECURITY]
  - id: INV-AUTH-003
    rule: unauthenticated users can proceed through guest booking without forcing account creation.
    tags: [CONVERSION, BOOKING]
  - id: INV-AUTH-004
    rule: auth errors shown to users are support-safe and do not disclose provider secrets or internal stack traces.
    tags: [AUTH, TRUST, SECURITY]
  - id: INV-AUTH-005
    rule: session revocation actions can target only sessions owned by the authenticated user and never revoke unknown session IDs.
    tags: [AUTH, SECURITY]
  - id: INV-AUTH-006
    rule: suspicious login detection and recent activity signals are surfaced consistently between session APIs and dashboard security views.
    tags: [AUTH, TRUST, SECURITY]
  - id: INV-AUTH-007
    rule: auth feature-flag and session-strategy semantics must be evaluated by shared runtime config logic across auth runtime, capabilities API, and sessions API.
    tags: [AUTH, TRUST, SECURITY]
  - id: INV-AUTH-008
    rule: provider capability responses must be emitted in deterministic registry order with explicit disabled reasons for non-operational providers.
    tags: [AUTH, TRUST]

trust_boundaries:
  zones:
    - name: customer-browser
      trust_level: untrusted
      contains:
        - auth forms
        - capability ui rendering
    - name: app-server
      trust_level: trusted
      contains:
        - provider capability evaluation
        - auth route handling
        - session management
    - name: external-auth-providers
      trust_level: external-trusted-via-contract
      contains:
        - oauth providers
        - magic-link email provider

release_slices:
  - slice_id: AUTH-S1
    title: provider capability registry and premium sign-in shell
    priority: P0
    dependencies: []
  - slice_id: AUTH-S2
    title: credentials auth and registration flow
    priority: P0
    dependencies:
      - AUTH-S1
  - slice_id: AUTH-S3
    title: password reset, guest claim, and session activity management
    priority: P1
    dependencies:
      - AUTH-S2
