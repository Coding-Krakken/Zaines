meta:
  id: system-state-model
  version: 1.0.0
  status: active
  owner: solution-architect
  date: 2026-05-11
  traceability_tags: [PRICING, TRUST, BOOKING, SAFETY]

scope:
  domain: booking-payments-revenue-recognition
  in_scope:
    - Stripe PaymentIntent-backed booking payments
    - Revenue recognition service-period modeling
    - Refund and cancellation correction semantics
    - Tax and passthrough classification metadata
  out_of_scope:
    - Subscription billing lifecycle
    - Usage-metered billing lifecycle
    - External ERP posting automation

domain_entities:
  - name: BookingRevenueContract
    fields:
      booking_id: string
      booking_number: string
      service_period_start: datetime
      service_period_end: datetime
      amount: number
      tax_amount: number
      currency: string

  - name: RevenueRecognitionProfile
    fields:
      method: enum[service_period, at_payment, excluded]
      recognition_status: enum[deferred, partially_recognized, fully_recognized, reversed, voided, excluded]
      deferred_revenue_amount: number
      recognized_revenue_amount: number
      tax_treatment: enum[booking_taxable, third_party_tax, non_taxable]
      passthrough_fee_amount: number
      exclusion_reason: string?

  - name: RevenueCorrectionEvent
    fields:
      payment_id: string
      source_event_id: string
      correction_type: enum[refund, cancellation, import_override]
      previous_status: string
      next_status: string
      corrected_at: datetime

state_machines:
  - name: RevenueRecognitionLifecycle
    states:
      - pending_payment
      - deferred
      - partially_recognized
      - fully_recognized
      - reversed
      - voided
      - excluded
    transitions:
      - from: pending_payment
        to: deferred
        guard:
          - payment_status == succeeded
          - recognition_method == service_period
      - from: deferred
        to: partially_recognized
        guard:
          - service_period_progress > 0
          - service_period_progress < 1
      - from: partially_recognized
        to: fully_recognized
        guard:
          - service_period_progress == 1
      - from: deferred
        to: reversed
        guard:
          - payment_status == refunded
      - from: partially_recognized
        to: reversed
        guard:
          - payment_status == refunded
      - from: pending_payment
        to: voided
        guard:
          - payment_status in [failed, cancelled]
      - from: deferred
        to: excluded
        guard:
          - exclusion_rule_applied == true
    forbidden_transitions:
      - from: pending_payment
        to: fully_recognized
        reason: recognition cannot occur before successful payment and service-period processing
      - from: reversed
        to: fully_recognized
        reason: reversed revenue requires explicit correction workflow

invariants:
  - id: INV-RR-001
    rule: service_period_end must be greater than service_period_start when recognition_method is service_period.
    tags: [BOOKING, PRICING]
  - id: INV-RR-002
    rule: deferred_revenue_amount + recognized_revenue_amount must equal gross amount unless status is reversed or voided.
    tags: [PRICING, TRUST]
  - id: INV-RR-003
    rule: no payment card data is stored in recognition entities.
    tags: [SAFETY, TRUST]
  - id: INV-RR-004
    rule: excluded transactions must include exclusion_reason.
    tags: [TRUST]

trust_boundaries:
  zones:
    - name: stripe-platform
      trust_level: external-trusted-via-contract
      contains:
        - payment intents
        - charges
        - webhook events
    - name: app-server
      trust_level: trusted
      contains:
        - payment persistence
        - recognition metadata
        - admin finance APIs
    - name: reporting-exports
      trust_level: restricted
      contains:
        - recognition csv exports
        - period summaries

release_slices:
  - slice_id: RR-S1
    title: model and schema foundation
    priority: P0
    dependencies: []
  - slice_id: RR-S2
    title: payment flow enrichment and webhook corrections
    priority: P0
    dependencies:
      - RR-S1
  - slice_id: RR-S3
    title: reporting and export parity
    priority: P1
    dependencies:
      - RR-S2
