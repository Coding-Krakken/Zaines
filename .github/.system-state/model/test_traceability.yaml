meta:
  id: canonical-test-traceability
  version: 1.0.0
  status: active
  owner: qa-test-engineer
  date: 2026-05-11

traceability:
  - acceptance_id: AC-RR-001
    description: Payment creation persists revenue recognition defaults.
    invariants:
      - INV-RR-001
      - INV-RR-002
    tests:
      - src/__tests__/payments-create-intent-extended.test.ts
      - src/__tests__/booking-payment-e2e.test.ts

  - acceptance_id: AC-RR-002
    description: Webhook success/failure/refund transitions mutate recognition fields idempotently.
    invariants:
      - INV-RR-002
    tests:
      - src/__tests__/payments-webhook-extended.test.ts
      - src/__tests__/booking-flow-contract.test.ts

  - acceptance_id: AC-RR-003
    description: Finance summaries can represent deferred vs recognized revenue totals.
    invariants:
      - INV-RR-002
    tests:
      - src/__tests__/admin-finance-authz.test.ts

  - acceptance_id: AC-RR-004
    description: No card data appears in recognition persistence or logs.
    invariants:
      - INV-RR-003
    tests:
      - src/__tests__/booking-payment-e2e.test.ts

  - acceptance_id: AC-AUTH-001
    description: Sign-in surfaces only configured and operational auth methods.
    invariants:
      - INV-AUTH-001
      - INV-AUTH-008
    tests:
      - src/__tests__/auth-provider-capabilities.test.ts

  - acceptance_id: AC-AUTH-002
    description: Credentials sign-in rejects invalid passwords with support-safe response and no secret leakage.
    invariants:
      - INV-AUTH-002
      - INV-AUTH-004
    tests:
      - src/__tests__/auth-credentials-lockout.test.ts

  - acceptance_id: AC-AUTH-003
    description: Magic-link entry flow preserves support-safe envelopes, intent routing, and correlation IDs.
    invariants:
      - INV-AUTH-001
      - INV-AUTH-004
    tests:
      - src/__tests__/auth-magic-link.test.ts
      - src/app/api/auth/magic-link/__tests__/route.test.ts

  - acceptance_id: AC-AUTH-004
    description: Session payloads and revocation endpoints enforce ownership, strategy visibility, and suspicious activity parity.
    invariants:
      - INV-AUTH-004
      - INV-AUTH-005
      - INV-AUTH-006
    tests:
      - src/__tests__/auth-sessions-route.test.ts
      - src/__tests__/auth-security-panel-state.test.ts

  - acceptance_id: AC-AUTH-005
    description: Sign-in and dashboard auth surfaces derive visible methods and fallback states only from validated capability/state inputs.
    invariants:
      - INV-AUTH-001
      - INV-AUTH-004
      - INV-AUTH-007
    tests:
      - src/__tests__/auth-capabilities-route.test.ts
      - src/__tests__/auth-provider-capabilities.test.ts
      - src/__tests__/auth-runtime-config-parity.test.ts
      - src/__tests__/auth-signin-surface.test.ts
      - src/__tests__/auth-signin-flow.test.ts
      - src/__tests__/auth-access-preferences-state.test.ts

  - acceptance_id: AC-AUTH-006
    description: Suspicious login heuristics and sign-in activity telemetry preserve deterministic classification and support-safe events.
    invariants:
      - INV-AUTH-004
      - INV-AUTH-006
    tests:
      - src/__tests__/auth-security-heuristics.test.ts
      - src/__tests__/auth-signin-activity.test.ts
