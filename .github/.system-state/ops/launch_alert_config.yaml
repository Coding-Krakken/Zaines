version: 1.0.0
issue: 67
title: "Launch Alert Configuration"
date_created: "2026-05-06"
environment: "production"

# =============================================================================
# ALERT CONFIGURATION FOR LAUNCH PHASES
# =============================================================================
# This configuration defines all alert rules triggered during the staged rollout.
# Maps SLO thresholds (from .github/framework-config/slo-thresholds.yaml)
# to actionable alert rules with escalation procedures.
#
# Alert Channels:
#   - PagerDuty: SEV-1/SEV-2 (requires on-call engineer immediate action)
#   - Slack #alerts: SEV-3/SEV-4 (informational, no paging)
#   - Slack #launches: All launch-phase events
# =============================================================================

# =============================================================================
# PHASE CONFIGURATION (traffic % → alert thresholds)
# =============================================================================

phases:
  phase_1:
    traffic_percentage: 10
    duration_hours: 24
    alert_profile: "canary"
  phase_2:
    traffic_percentage: 25
    duration_hours: 48
    alert_profile: "early_adopter"
  phase_3:
    traffic_percentage: 50
    duration_hours: 72
    alert_profile: "majority"
  phase_4:
    traffic_percentage: 100
    duration_hours: null  # ongoing
    alert_profile: "production"

# =============================================================================
# ALERT RULES BY SEVERITY
# =============================================================================

alerts:
  # ---------------------------------------------------------------------------
  # SEV-1: IMMEDIATE ACTION REQUIRED (Page on-call engineer)
  # ---------------------------------------------------------------------------

  SEV_1_error_rate_spike:
    name: "High Error Rate Detected"
    metric: "error_rate"
    rule: "error_rate > 1% for 5 minutes"
    phase_thresholds:
      phase_1: ">1.0%"
      phase_2: ">1.0%"
      phase_3: ">0.5%"
      phase_4: ">0.5%"
    evaluation_window: "5 minutes"
    severity: "SEV-1"
    channels: ["PagerDuty", "Slack #alerts", "Slack #launches"]
    runbook: "docs/LAUNCH_INCIDENT_RUNBOOKS.md → INC-006"
    auto_action: "Trigger automatic rollback (Vercel instant rollback)"
    description: |
      Application error rate has exceeded safe threshold. This indicates either
      code regression, external API failure, or infrastructure issue.
      Immediate investigation and remediation required.
    escalation: |
      1. Incident Commander declared (auto-paged)
      2. Auto-rollback initiated (Vercel instant rollback, ~30s)
      3. Verify rollback successful via health check
      4. Root cause analysis within 30 minutes
      5. Post-incident review within 24 hours

  SEV_1_checkout_failure_spike:
    name: "Checkout Success Rate Drop"
    metric: "checkout_success_rate"
    rule: "checkout_success_rate < 95% for 5 minutes"
    phase_thresholds:
      phase_1: "<95%"
      phase_2: "<95%"
      phase_3: "<95%"
      phase_4: "<95%"
    evaluation_window: "5 minutes"
    severity: "SEV-1"
    channels: ["PagerDuty", "Slack #alerts", "Slack #launches"]
    runbook: "docs/LAUNCH_INCIDENT_RUNBOOKS.md → INC-007"
    auto_action: "Trigger automatic rollback"
    description: |
      Checkout funnel is failing more than acceptable. Customers cannot
      complete purchases. Revenue impact is IMMEDIATE.
    escalation: |
      1. Incident Commander + Revenue Officer paged
      2. Auto-rollback initiated
      3. Verify payment system health (Square API status)
      4. If not payment system: code rollback + investigate
      5. Revenue impact assessment within 15 minutes

  SEV_1_payment_processing_failed:
    name: "Payment Processing Failure"
    metric: "payment_success_rate"
    rule: "payment_success_rate < 95% for 2 minutes"
    phase_thresholds:
      phase_1: "<95%"
      phase_2: "<95%"
      phase_3: "<99%"
      phase_4: "<99%"
    evaluation_window: "2 minutes"
    severity: "SEV-1"
    channels: ["PagerDuty", "Slack #alerts", "Slack #launches"]
    runbook: "docs/LAUNCH_INCIDENT_RUNBOOKS.md → INC-007 (checkout variant)"
    auto_action: "Manual review + potential rollback (DNS fallback if critical)"
    description: |
      Square API payment processing has failed for multiple transactions.
      Indicates PCI boundary issue or Square integration failure.
      CRITICAL: Customer data at risk.
    escalation: |
      1. Security Engineer + Backend Engineer paged immediately
      2. Check Square API status page
      3. If Square outage: display maintenance banner, wait for Square fix
      4. If integration bug: rollback immediately (DNS fallback recommended)
      5. Security review required before re-launch

  SEV_1_latency_spike:
    name: "Latency Spike Detected"
    metric: "latency_p95"
    rule: "latency_p95 > 3s for 5 minutes"
    phase_thresholds:
      phase_1: ">3.0s"
      phase_2: ">3.0s"
      phase_3: ">3.0s"
      phase_4: ">3.0s"
    evaluation_window: "5 minutes"
    severity: "SEV-1"
    channels: ["PagerDuty", "Slack #alerts", "Slack #launches"]
    runbook: "docs/LAUNCH_INCIDENT_RUNBOOKS.md → INC-008"
    auto_action: "Trigger automatic rollback if sustained >5min"
    description: |
      Response latency degradation below acceptable level. Customers
      experiencing timeout errors or very slow page loads.
    escalation: |
      1. Performance Engineer + Backend Engineer paged
      2. Identify bottleneck: frontend, API, database, external service
      3. Attempt optimization (cache, query tuning)
      4. If not resolved in 5 minutes: rollback

  SEV_1_security_incident:
    name: "Critical Security Alert"
    metric: "sentry_critical_security"
    rule: "Sentry detects critical security issue (code injection, exposed credentials, etc.)"
    severity: "SEV-1"
    channels: ["PagerDuty", "Slack #security", "Slack #launches"]
    runbook: "docs/LAUNCH_INCIDENT_RUNBOOKS.md → INC-009"
    auto_action: "Manual review; likely DNS fallback + incident response"
    description: |
      Security vulnerability detected in production. Immediate containment required.
    escalation: |
      1. Security Engineer + CISO paged immediately
      2. Assess severity: confirmed breach vs. potential vulnerability
      3. If confirmed: activate incident response, likely rollback
      4. Notify affected users if data breach confirmed

  SEV_1_data_integrity:
    name: "Data Integrity Issue"
    metric: "inventory_sync_failure"
    rule: "Square inventory sync failure rate > 10% for 5 minutes"
    severity: "SEV-1"
    channels: ["PagerDuty", "Slack #alerts", "Slack #launches"]
    runbook: ".github/RUNBOOK.md → INC-004"
    auto_action: "Manual review; consider rollback if widespread"
    description: |
      Product inventory or pricing showing stale/incorrect data.
      Customer trust at risk.
    escalation: |
      1. Backend Engineer + Data Engineer paged
      2. Check Square API webhooks and sync status
      3. If sync broken: either fix in minutes or rollback
      4. Manual reconciliation if data drift detected

  # ---------------------------------------------------------------------------
  # SEV-2: URGENT (Page on-call, but may not require immediate rollback)
  # ---------------------------------------------------------------------------

  SEV_2_elevated_error_rate:
    name: "Elevated Error Rate"
    metric: "error_rate"
    rule: "error_rate between 0.5% and 1% for 10 minutes"
    phase_thresholds:
      phase_1: "0.5-1.0%"
      phase_2: "0.5-1.0%"
      phase_3: "0.2-0.5%"
      phase_4: "0.2-0.5%"
    evaluation_window: "10 minutes"
    severity: "SEV-2"
    channels: ["PagerDuty", "Slack #alerts", "Slack #launches"]
    runbook: "docs/LAUNCH_INCIDENT_RUNBOOKS.md → INC-006 (early warning)"
    auto_action: "None (informational alert for monitoring trend)"
    description: |
      Error rate is elevated but below critical threshold. Indicates
      potential issue developing that may become critical.
    escalation: |
      1. On-call engineer paged (not urgent page, lower priority)
      2. Monitor trend: is error rate increasing or stabilizing?
      3. If increasing toward 1%: escalate to SEV-1
      4. If stable: investigate root cause but continue monitoring

  SEV_2_checkout_warning:
    name: "Checkout Success Degradation"
    metric: "checkout_success_rate"
    rule: "checkout_success_rate between 95% and 99%"
    phase_thresholds:
      phase_1: "95-99%"
      phase_2: "95-99%"
      phase_3: "95-99%"
      phase_4: "95-99%"
    evaluation_window: "15 minutes"
    severity: "SEV-2"
    channels: ["Slack #alerts", "Slack #launches"]
    runbook: "docs/LAUNCH_INCIDENT_RUNBOOKS.md → INC-007 (warning)"
    auto_action: "None"
    description: |
      Checkout success rate is degraded but still acceptable.
      Early warning before critical threshold.
    escalation: |
      1. Product Owner notified
      2. Monitor for trend deterioration
      3. If crosses 95%: escalate to SEV-1
      4. Investigate user experience issues

  SEV_2_latency_elevated:
    name: "Latency Elevated"
    metric: "latency_p95"
    rule: "latency_p95 between 1.5s and 3.0s"
    phase_thresholds:
      phase_1: "1.5-3.0s"
      phase_2: "1.5-3.0s"
      phase_3: "1.5-3.0s"
      phase_4: "1.5-3.0s"
    evaluation_window: "5 minutes"
    severity: "SEV-2"
    channels: ["Slack #perf", "Slack #launches"]
    runbook: "docs/LAUNCH_INCIDENT_RUNBOOKS.md → INC-008 (early warning)"
    auto_action: "None"
    description: |
      Performance is degraded beyond SLO but not yet critical.
      Users may notice slowness but can still complete transactions.
    escalation: |
      1. Performance Engineer notified
      2. Identify bottleneck (profile if needed)
      3. Attempt optimization (cache tuning, query optimization)
      4. Monitor for further degradation toward critical threshold

  # ---------------------------------------------------------------------------
  # SEV-3: WARNING (Informational, no paging)
  # ---------------------------------------------------------------------------

  SEV_3_revenue_anomaly:
    name: "Revenue Anomaly Detected"
    metric: "revenue_per_hour"
    rule: "revenue_per_hour < 90% of baseline for 30 minutes"
    phase_thresholds:
      phase_3: "<90% of Phase 2 baseline"
      phase_4: "<85% of Phase 3 baseline"
    evaluation_window: "30 minutes"
    severity: "SEV-3"
    channels: ["Slack #business", "Slack #launches"]
    runbook: "Manual investigation: is it traffic pattern or checkout issue?"
    auto_action: "None"
    description: |
      Revenue is tracking below expected. May indicate checkout issues,
      traffic pattern change, or external factor.
    escalation: |
      1. Product Owner reviews alert
      2. Correlate with error rate / checkout success metrics
      3. If metrics normal: likely traffic pattern variance, continue monitoring
      4. If metrics degraded: escalate to appropriate SEV-1 or SEV-2

  SEV_3_memory_leak_warning:
    name: "Memory Usage Elevated"
    metric: "memory_usage"
    rule: "memory_usage > 500MB for 15 minutes"
    evaluation_window: "15 minutes"
    severity: "SEV-3"
    channels: ["Slack #perf", "Slack #launches"]
    runbook: "Manual review: inspect heap dump or restart process"
    auto_action: "None"
    description: |
      Application memory usage is elevated, possible memory leak.
      Not yet critical, but requires investigation.
    escalation: |
      1. Backend Engineer reviews memory profile
      2. Check for known memory leak patterns
      3. Consider process restart if memory continues rising
      4. If confirmed leak: prioritize fix for next patch

  SEV_3_database_lag:
    name: "Database Query Lag"
    metric: "database_query_latency_p95"
    rule: "database_query_latency_p95 > 100ms"
    evaluation_window: "10 minutes"
    severity: "SEV-3"
    channels: ["Slack #backend", "Slack #launches"]
    runbook: "Manual review: check query plans and Square API response times"
    auto_action: "None"
    description: |
      Database queries (primarily Square API calls) are running slower than expected.
      Not yet impacting end-user latency but trending wrong direction.
    escalation: |
      1. Backend Engineer reviews slow query logs
      2. Check Square API status page
      3. Optimize queries if possible
      4. Consider caching strategy adjustment

  # ---------------------------------------------------------------------------
  # SEV-4: INFO (Tracking, no action required)
  # ---------------------------------------------------------------------------

  SEV_4_phase_transition:
    name: "Phase Transition Notification"
    metric: "launch_phase"
    rule: "Automatic notification at phase transition"
    severity: "SEV-4"
    channels: ["Slack #launches"]
    description: |
      Informational alert: traffic shifting to next phase, metrics snapshot attached.
    actions: |
      1. Verify metrics meet gate conditions for phase transition
      2. Confirm SRE Engineer + Team Lead approval
      3. Update issue #67 with phase transition timestamp
      4. Snapshot metrics for historical tracking

  SEV_4_daily_review_gate:
    name: "Daily Review Gate"
    metric: "launch_monitoring"
    rule: "Automatic daily summary during Phase 4 (14-day monitoring)"
    severity: "SEV-4"
    channels: ["Slack #launches"]
    description: |
      Daily summary of 24-hour metrics with trend analysis.
    actions: |
      1. Collect 24-hour metrics snapshot
      2. Compare to previous day and Phase 4 start baseline
      3. Identify any concerning trends
      4. Publish summary in Slack + GitHub issue comment

# =============================================================================
# ALERT ROUTING & ESCALATION
# =============================================================================

escalation:
  pagerduty_policy:
    on_call_primary:
      role: "Incident Commander"
      response_time_sev1: "5 minutes"
      response_time_sev2: "15 minutes"
    on_call_backup:
      role: "SRE Engineer"
      response_time_sev1: "10 minutes"
      response_time_sev2: "30 minutes"

  slack_channels:
    launches: "#launches (all launch alerts)"
    alerts: "#alerts (SEV-2, SEV-3)"
    perf: "#perf (performance-related)"
    security: "#security (security-related)"
    business: "#business (revenue/conversion)"

  escalation_procedures:
    sev_1_automatic:
      - "PagerDuty alert fired (on-call engineer notified)"
      - "Auto-rollback executed (if applicable)"
      - "Slack #launches message posted"
      - "Incident Commander activates war room"
      - "Post-incident review scheduled within 24h"

    sev_2_manual:
      - "Slack #alerts message posted"
      - "On-call engineer reviews (can defer action if stable)"
      - "Slack thread used for investigation"
      - "If trend worsening: escalate to SEV-1"

    sev_3_tracking:
      - "Slack message posted (low urgency)"
      - "No paging, investigated during business hours"
      - "Correlated with other metrics for pattern detection"

# =============================================================================
# ALERT TUNING & THRESHOLDS
# =============================================================================

threshold_tuning:
  rationale: |
    Alert thresholds are configured with buffers above actual SLO targets
    to provide early warning while minimizing false positives.

    Phase 1 (Canary):     Generous thresholds (5x SLO buffer) - maximize stability validation
    Phase 2 (Early):      Moderate thresholds (3x SLO buffer) - increased coverage
    Phase 3 (Majority):   Strict thresholds (1.5x SLO buffer) - near-production rigor
    Phase 4 (Production): Exact SLO thresholds - full enforcement

  evaluation_windows:
    error_rate: "5 minutes (catch spikes quickly)"
    checkout_success: "5 minutes (catch funnel issues quickly)"
    latency: "5 minutes (catch degradation quickly)"
    payment_processing: "2 minutes (quick detection for PCI risk)"
    business_metrics: "15-30 minutes (account for traffic variance)"

  suppress_alert_if:
    - "Planned maintenance window (pre-announced in #launches)"
    - "Known external service outage (Square status page shows yellow/red)"
    - "Alert fatigue threshold exceeded (max 3 alerts per 5min)" # prevents storm

# =============================================================================
# MONITORING DASHBOARD CONFIGURATION
# =============================================================================

dashboards:
  executive_dashboard:
    name: "Launch Status - Executive View"
    refresh_rate: "10 seconds"
    widgets:
      - "Traffic Phase (current %)"
      - "Error Rate (vs SLO threshold)"
      - "Checkout Success Rate (vs SLO threshold)"
      - "P95 Latency (vs SLO threshold)"
      - "Revenue Trend (24h)"
      - "Incidents Open (count)"
      - "Alerts Fired (last 24h)"
    audience: "C-level, stakeholders"

  technical_dashboard:
    name: "Launch Status - Technical View"
    refresh_rate: "5 seconds"
    widgets:
      - "Error Rate by Endpoint"
      - "Latency Distribution (p50, p95, p99)"
      - "Memory / CPU Usage"
      - "Database Connection Pool"
      - "Square API Response Times"
      - "Cache Hit Rate"
      - "Recent Errors (Sentry, live stream)"
    audience: "Engineers, SREs"

  business_dashboard:
    name: "Launch Status - Business View"
    refresh_rate: "30 seconds"
    widgets:
      - "Orders Processed (count)"
      - "Revenue (hourly)"
      - "Conversion Rate (vs 2% target)"
      - "Average Order Value"
      - "Cart Abandonment Rate"
      - "Customer Comments (sentiment)"
      - "Support Tickets (volume)"
    audience: "Product Owner, Marketing"

# =============================================================================
# ALERT TESTING & VALIDATION
# =============================================================================

testing:
  pre_launch_drill:
    objective: "Verify alert configuration works and team responds correctly"
    schedule: "T-24 hours before launch"
    test_alerts:
      - "Fire test SEV-1 alert (error rate spike) → verify PagerDuty, Slack, auto-rollback"
      - "Fire test SEV-2 alert (checkout warning) → verify Slack notification"
      - "Fire test SEV-3 alert (revenue anomaly) → verify Slack routing"
    expected_outcome: |
      1. PagerDuty alert received by on-call engineer within 2 min
      2. Slack messages posted to correct channels
      3. Team responds to test (acknowledges in Slack thread)
      4. Auto-rollback executes (if applicable to test)
      5. False alert cleared from dashboards

  dry_run_results:
    timestamp: ""  # To be filled during launch week
    success: false  # To be updated after drill
    issues_found: []
    remediation: []

# =============================================================================
# DOCUMENTATION & REFERENCES
# =============================================================================

references:
  - ".github/framework-config/slo-thresholds.yaml — SLO definitions (source of truth)"
  - ".github/LAUNCH_READINESS.md — Launch readiness checklist"
  - ".github/.system-state/ops/launch_exposure_plan.yaml — Staged rollout plan"
  - "docs/LAUNCH_INCIDENT_RUNBOOKS.md — Incident response runbooks (INC-006 to INC-009)"
  - "docs/POST_LAUNCH_MONITORING_PLAN.md — 14-day monitoring strategy"
  - ".github/RUNBOOK.md — General operational procedures"
