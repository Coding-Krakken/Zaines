version: 1.0.0
issue: 67
title: "Staged Exposure Plan: Funky Town Comics & Vinyl Launch"
date_created: "2026-05-06"
date_approved: ""  # To be filled by stakeholders
authority: quality-director

# =============================================================================
# OVERVIEW
# =============================================================================

overview:
  objective: "Gradually roll out Funky Town headless commerce platform with continuous monitoring and immediate rollback capability."
  slo_targets:
    uptime: 99.9%
    checkout_success: ">99%"
    error_rate: "<0.1%"
    latency_p95: "<1.5s"
    conversion_rate_target: ">2.0%"
  rollback_capability: "<=5 minutes to Square Online fallback"
  total_duration: "7 days (24h + 48h + 72h + final)"

# =============================================================================
# PHASE 1: CANARY DEPLOYMENT (10% Traffic, 24 hours)
# =============================================================================

phase_1:
  name: "Canary Deployment"
  duration_hours: 24
  traffic_percentage: 10
  affected_users_estimate: "~50 concurrent users"
  objective: "Verify zero critical errors and baseline metrics under low load"

  # --- Traffic Configuration ---
  traffic_config:
    method: "Vercel traffic splitting (HTTP header routing)"
    percentage: 10
    routing_strategy: "Sample 10% of incoming traffic to new deployment"
    rollback_method: "Option 1: Vercel instant promote (<30s)"

  # --- Gate Conditions (All must be met to proceed to Phase 2) ---
  gate_conditions:
    error_rate_threshold: "<0.5%"  # 5x SLO buffer
    checkout_success_threshold: ">99.5%"  # Half-point above SLO
    latency_p95_threshold: "<1.2s"  # SLO target
    latency_p99_threshold: "<2.0s"
    sentry_critical_alerts: "0"
    memory_leak_detection: "None detected"

  # --- Monitoring Cadence ---
  monitoring:
    frequency: "Every 15 minutes"
    dashboards_required:
      - "Vercel Analytics: Core Web Vitals"
      - "Sentry: Error rate, critical alerts"
      - "Custom: Checkout success rate, order count"
      - "Business: Revenue, average order value"
    metrics_to_track:
      - error_rate
      - checkout_success_rate
      - payment_error_rate
      - latency_p50_p95_p99
      - memory_usage
      - cpu_usage
      - database_connection_count
      - square_api_latency

  # --- Automatic Rollback Triggers ---
  auto_rollback_triggers:
    - trigger: "Error rate exceeds 1% for 5 minutes"
      action: "Automatic Vercel instant rollback"
      response_time: "~30 seconds"
    - trigger: "Checkout success drops below 95% for 5 minutes"
      action: "Automatic Vercel instant rollback"
      response_time: "~30 seconds"
    - trigger: "P95 latency exceeds 3s for 5 minutes"
      action: "Automatic Vercel instant rollback"
      response_time: "~30 seconds"
    - trigger: "Sentry detects critical error (severity=critical)"
      action: "Alert incident commander; manual review for rollback"
      response_time: "~5 minutes for decision"

  # --- Manual Escalation Triggers ---
  manual_escalation_triggers:
    - trigger: "Customer complaint spike (>3 reports in 30 min)"
      action: "Product Owner may request pause; review metrics"
    - trigger: "Security anomaly detected"
      action: "Security Engineer recommends rollback evaluation"

  # --- Success Criteria ---
  success_criteria: |
    1. Error rate: <0.5% (measured over full 24h)
    2. Checkout success rate: >99.5% (no individual transaction series >5 fails)
    3. P95 latency: <1.2s (no spike above 1.5s sustained >5min)
    4. Zero critical Sentry alerts
    5. Square API integration: 100% response (no timeout failures)
    6. Payment processing: 0 unexplained declines above baseline
    7. No customer escalations requiring immediate action

  # --- Metrics Snapshot Template (to be collected every 2h) ---
  metrics_snapshot:
    timestamp: ""
    error_rate_percent: ""
    checkout_success_percent: ""
    payment_error_count: ""
    latency_p95_ms: ""
    latency_p99_ms: ""
    traffic_percentage: "10%"
    concurrent_users_estimated: ""
    memory_usage_mb: ""
    orders_processed: ""
    revenue_generated: ""
    notes: ""

  # --- Decision at 24h Mark ---
  transition_decision:
    criteria_met: false  # To be updated during launch
    approved_by: ""  # SRE Engineer + Tech Lead sign-off
    timestamp: ""
    next_phase: "Phase 2 (25%)"
    abort_reason: ""  # Only filled if abort decision made

# =============================================================================
# PHASE 2: EARLY ADOPTER EXPANSION (25% Traffic, 48 hours)
# =============================================================================

phase_2:
  name: "Early Adopter Expansion"
  duration_hours: 48
  traffic_percentage: 25
  affected_users_estimate: "~130 concurrent users"
  objective: "Verify stability under moderate load and checkout conversion funnel"

  traffic_config:
    method: "Vercel traffic splitting"
    percentage: 25
    routing_strategy: "Route 25% of traffic to new deployment"
    rollback_method: "Option 1 or 2: Vercel instant OR git revert (<3min)"

  gate_conditions:
    error_rate_threshold: "<0.5%"
    checkout_success_threshold: ">99.5%"
    latency_p95_threshold: "<1.2s"
    latency_p99_threshold: "<2.0s"
    conversion_rate_threshold: ">1.8%"  # Approaching SLO target
    square_api_error_rate: "<0.1%"
    no_new_sentry_patterns: true

  monitoring:
    frequency: "Every 15 minutes"
    dashboards_required:
      - "Vercel Analytics: Core Web Vitals + traffic split view"
      - "Sentry: Error patterns, new issues"
      - "Custom: Checkout funnel (product view → cart → checkout → payment)"
      - "Business: Revenue trending, ARPU comparison"
    metrics_to_track:
      - error_rate
      - checkout_success_rate
      - payment_error_rate
      - conversion_funnel_dropoff
      - latency_p50_p95_p99
      - cart_abandonment_rate
      - average_order_value
      - square_api_latency_percentiles

  auto_rollback_triggers:
    - trigger: "Error rate exceeds 1% for 5 minutes"
      action: "Automatic Vercel instant rollback"
    - trigger: "Checkout success drops below 95%"
      action: "Automatic Vercel instant rollback"
    - trigger: "Conversion rate drops >20% vs Phase 1 baseline"
      action: "Incident Commander reviews; consider rollback"
    - trigger: "New high-frequency Sentry error pattern (>50 in 1h)"
      action: "Alert team; manual review"

  success_criteria: |
    1. Error rate: <0.5% (sustained across 48h)
    2. Checkout success: >99.5% (no regression from Phase 1)
    3. Conversion rate: >1.8% (approaching 2% SLO target)
    4. P95 latency: <1.2s (no new spike patterns)
    5. Payment success rate: >99% (Square integration stable)
    6. No new critical Sentry patterns
    7. Revenue trend: stable or increasing vs Phase 1
    8. Customer escalations: ≤1 (no blocking issues)

  transition_decision:
    criteria_met: false
    approved_by: ""  # SRE Engineer + Product Owner sign-off
    timestamp: ""
    next_phase: "Phase 3 (50%)"
    abort_reason: ""

# =============================================================================
# PHASE 3: MAJORITY ROLLOUT (50% Traffic, 72 hours)
# =============================================================================

phase_3:
  name: "Majority Rollout"
  duration_hours: 72
  traffic_percentage: 50
  affected_users_estimate: "~260 concurrent users"
  objective: "Verify full system stability under near-production load"

  traffic_config:
    method: "Vercel traffic splitting with feature flag failsafe"
    percentage: 50
    routing_strategy: "50/50 split between new and legacy systems"
    rollback_method: "Option 1, 2, or 3: Vercel instant OR git revert OR DNS fallback"

  gate_conditions:
    error_rate_threshold: "<0.3%"  # Stricter than Phase 2
    checkout_success_threshold: ">99.5%"
    latency_p95_threshold: "<1.2s"
    latency_p99_threshold: "<2.0s"
    conversion_rate_threshold: ">1.9%"
    payment_success_rate_threshold: ">99.5%"
    revenue_per_hour: ">baseline * 0.9"  # At least 90% of expected

  monitoring:
    frequency: "Every 10 minutes"
    dashboards_required:
      - "Vercel Analytics: Real-time traffic split, Core Web Vitals"
      - "Sentry: Error rate, payment errors, API errors"
      - "Custom: Order volume, payment processing queue, inventory sync"
      - "Business: Hourly revenue, conversion rate trend, customer comments"
    metrics_to_track:
      - error_rate_by_endpoint
      - checkout_success_funnel_full_flow
      - payment_decline_rate
      - latency_distribution_p50_p95_p99_p999
      - cache_hit_rate
      - database_query_latency
      - square_api_health_status
      - revenue_trend
      - orders_per_minute

  auto_rollback_triggers:
    - trigger: "Error rate exceeds 0.5% for 5 minutes"
      action: "Automatic Vercel instant rollback"
    - trigger: "Checkout success drops below 95%"
      action: "Automatic Vercel instant rollback"
    - trigger: "Payment success rate drops below 99%"
      action: "Incident Commander immediately escalates; rollback likely"
    - trigger: "Revenue drops >30% vs hourly baseline"
      action: "Product Owner + Incident Commander joint review; rollback consideration"
    - trigger: "Critical security alert in Sentry"
      action: "Security Engineer recommends immediate rollback"

  success_criteria: |
    1. Error rate: <0.3% (sustaining stricter threshold)
    2. Checkout success: >99.5% (stable across all 72h)
    3. Conversion rate: >1.9% (approaching 2% target)
    4. Payment success: >99.5% (exceeds minimum SLO)
    5. P95 latency: <1.2s (no degradation under 50% load)
    6. Revenue: ≥90% of expected hourly rate
    7. Orders processed: ≥50 successful transactions (sufficient sample)
    8. Customer escalations: 0 blocking issues
    9. No new critical Sentry patterns in final 12h

  transition_decision:
    criteria_met: false
    approved_by: ""  # SRE Engineer + Product Owner + Stakeholder Executive sign-off
    timestamp: ""
    next_phase: "Phase 4 (100% - FULL RELEASE)"
    abort_reason: ""

# =============================================================================
# PHASE 4: FULL RELEASE (100% Traffic, Production)
# =============================================================================

phase_4:
  name: "Full Release"
  duration_hours: "Ongoing (14-day monitoring period)"
  traffic_percentage: 100
  affected_users_estimate: "All users"
  objective: "Production stability and performance validation; activate 14-day monitoring plan"

  traffic_config:
    method: "100% traffic to new deployment"
    percentage: 100
    routing_strategy: "All traffic routed to new system; legacy system offline"
    rollback_method: "DNS fallback to Square Online (emergency only); estimated <5 min"

  gate_conditions:
    error_rate_threshold: "<0.1%"  # Full SLO
    checkout_success_threshold: ">99%"  # Full SLO
    latency_p95_threshold: "<1.5s"  # Full SLO
    latency_p99_threshold: "<2.5s"
    conversion_rate_threshold: ">2.0%"  # Full SLO
    payment_success_rate_threshold: ">99%"
    uptime_target: "99.9%"
    no_security_incidents: true

  monitoring:
    frequency: "Continuous (automated alerts)"
    dashboards_required:
      - "Executive dashboard: All SLOs visible in real-time"
      - "Technical dashboard: Error rates, latency, dependencies"
      - "Business dashboard: Revenue, conversion, customer satisfaction"
      - "Operational dashboard: Alerts, on-call status, runbook references"
    metrics_to_track:
      - all_metrics_from_phase_3
      - customer_support_tickets_per_hour
      - revenue_per_hour_cumulative
      - daily_active_users
      - repeat_purchase_rate
      - inventory_sync_lag_seconds
      - cart_recovery_rate

  daily_monitoring_gates:
    day_1_2:
      error_rate_threshold: "<0.2%"
      checkout_success_threshold: ">99%"
      approval_required_for_continuation: true
    day_3_5:
      error_rate_threshold: "<0.15%"
      checkout_success_threshold: ">99%"
      approval_required_for_continuation: true
    day_6_14:
      error_rate_threshold: "<0.1%"
      checkout_success_threshold: ">99%"
      approval_required_for_continuation: false

  auto_rollback_triggers:
    - trigger: "Error rate exceeds 0.5% for 5 minutes"
      action: "Incident Commander evaluates; likely DNS fallback trigger"
    - trigger: "Checkout success drops below 95% for 5 minutes"
      action: "DNS fallback to Square Online (if alternative unavailable)"
    - trigger: "Payment success drops below 95%"
      action: "Immediate incident war room; DNS fallback recommended"
    - trigger: "Critical security breach detected"
      action: "Security incident response plan activated"

  success_criteria: |
    1. Day 1-2: Error rate <0.2%, no critical alerts
    2. Day 3-5: Error rate <0.15%, conversion rate >2%
    3. Day 6-14: All SLOs sustained
    4. Revenue: ≥110% of pre-launch baseline (target achieved)
    5. Customer NPS: No significant degradation
    6. Checkout success: >99% across full 14 days
    7. Zero unresolved security findings
    8. Payment failures: <1% (within tolerance)

  post_launch_monitoring_reference: "docs/POST_LAUNCH_MONITORING_PLAN.md"

# =============================================================================
# ABORT PROCEDURES
# =============================================================================

abort_procedures:
  triggers:
    - "Automatic rollback threshold exceeded (see auto_rollback_triggers per phase)"
    - "Manual stakeholder decision (Product Owner, Executive)"
    - "Critical security vulnerability discovered"
    - "Data corruption or integrity issue detected"

  execution:
    immediate_actions:
      - "Incident Commander declares ABORT"
      - "SRE Engineer initiates rollback (Option 1: Vercel instant <30s)"
      - "Monitor rollback progress and health checks"
      - "Verify Square Online is serving traffic (if DNS fallback)"
      - "Post incident notification in Slack #launches"
    post_abort:
      - "Document abort trigger, timestamp, and duration"
      - "Schedule incident review within 24 hours"
      - "Update Issue #67 with abort details"
      - "No restart until root cause identified and fix implemented"

# =============================================================================
# COMMUNICATION PLAN
# =============================================================================

communication:
  pre_launch:
    day_minus_1: "Stakeholder notification: launch scheduled for tomorrow"
    hours_minus_2: "Team sync: final readiness check"
    hours_minus_1: "All-hands: launch in progress, watch alerts"

  during_launch:
    phase_start: "Slack #launches: Phase X starting (time window, metrics snapshot)"
    every_6h: "Slack #launches: Status update with current metrics"
    on_alert: "Slack #launches + @incident-commander: Alert triggered, action taken"
    phase_transition: "Slack #launches: Moving to Phase Y at [time]"

  post_launch:
    daily_14d: "Slack #launches: Daily review with 24h metrics summary"
    end_of_monitoring: "Public announcement: Launch complete, celebrating success"

# =============================================================================
# ROLLBACK STRATEGY (Detailed)
# =============================================================================

rollback:
  strategy: "Multi-tier fallback with automatic escalation"
  
  option_1_vercel_instant:
    target: "Last known good Vercel deployment"
    method: "Vercel Dashboard → Deployments → Promote"
    estimated_time: "~30 seconds"
    data_impact: "None (no data written yet)"
    verification: "Vercel deployment status + health check"
    reliability: "High (Vercel-managed)"
  
  option_2_git_revert:
    target: "Previous commit on main branch"
    method: "git revert + git push → Vercel auto-deploy"
    estimated_time: "2-3 minutes"
    data_impact: "None (reverts code, not data)"
    verification: "Git push confirms, Vercel deployment status"
    reliability: "Medium (requires successful git + Vercel deploy)"
  
  option_3_dns_fallback:
    target: "Square Online (legacy system)"
    method: "DNS CNAME change to Square Online target"
    estimated_time: "<5 minutes (DNS propagation)"
    data_impact: "Zero (Square is source of truth)"
    verification: "DNS resolution + manual site check + Square dashboard"
    reliability: "High (DNS-level fallback, preserve all data)"
  
  tier_escalation: |
    Attempt Option 1 immediately.
    If Option 1 fails or site still broken → Attempt Option 2 within 2 min.
    If Option 1 + 2 fail → Execute Option 3 (DNS fallback) within 5 min.
    All options bypass application logic; fallback is at infrastructure level.

  post_rollback_checklist:
    - "Site responding to requests"
    - "Checkout flow accessible"
    - "No PII exposed in error messages"
    - "Square Dashboard shows no data loss"
    - "Customer-facing status: green or degraded (not red)"
    - "Incident timeline documented"
    - "Root cause triage started"

