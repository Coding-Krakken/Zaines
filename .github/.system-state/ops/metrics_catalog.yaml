meta:
  id: canonical-metrics-catalog
  version: 1.0.0
  status: active
  owner: sre-engineer
  date: 2026-05-11

metrics:
  - name: revrec_transactions_total
    type: counter
    labels: [recognitionStatus, currency]
    source: finance-api

  - name: revrec_deferred_revenue_amount
    type: gauge
    labels: [currency]
    source: finance-api

  - name: revrec_recognized_revenue_amount
    type: gauge
    labels: [currency]
    source: finance-api

  - name: revrec_reversed_revenue_amount
    type: gauge
    labels: [currency]
    source: finance-api

  - name: revrec_excluded_transactions_total
    type: counter
    labels: [reason]
    source: finance-api

  - name: revrec_webhook_mutation_failures_total
    type: counter
    labels: [eventType, errorCode]
    source: payments-webhook

  - name: revrec_export_failures_total
    type: counter
    labels: [reportType]
    source: admin-finance-export

slos:
  - id: SLO-RR-001
    objective: revenue-recognition-summary availability >= 99.9%
  - id: SLO-RR-002
    objective: webhook recognition mutation success >= 99%
  - id: SLO-RR-003
    objective: recognition mismatch alert MTTD <= 15 minutes
