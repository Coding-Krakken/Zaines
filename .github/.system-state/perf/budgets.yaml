meta:
  id: performance-budgets
  version: 1.1.0
  status: active
  owner: performance-engineer
  date: 2026-05-13
  scope: luxury-release
  last_updated: 2026-05-13
  delivery_note: Phase 9 complete — image optimization, dynamic imports, resource hints applied

budgets:
  web_vitals:
    lcp_ms_p75: 1200
    inp_ms_p75: 150
    cls_p75: 0.05
  route_targets:
    - route: /
      lcp_ms_p75: 1200
      ttfb_ms_p75: 250
      js_kb_gzip: 220
      image_kb_above_fold: 350
    - route: /book
      lcp_ms_p75: 1300
      ttfb_ms_p75: 300
      js_kb_gzip: 260
      blocking_time_ms: 120
    - route: /dashboard
      lcp_ms_p75: 1400
      ttfb_ms_p75: 350
      js_kb_gzip: 280
      blocking_time_ms: 150
  lighthouse:
    performance_min: 90
    accessibility_min: 95
    seo_min: 95
    best_practices_min: 90

enforcement:
  in_ci: true
  block_merge_on_regression: true
  tolerated_regression_percent: 5
  measurement_window_days: 7

optimization_controls:
  - optimize_images_next_image
  - route_level_code_splitting
  - static_or_isr_for_marketing_pages
  - cache_control_for_static_assets
  - defer_non_critical_third_party_scripts

alerts:
  - id: PERF-ALERT-01
    condition: homepage_lcp_ms_p75 > 1500 for 15m
    severity: high
  - id: PERF-ALERT-02
    condition: booking_inp_ms_p75 > 250 for 15m
    severity: high
