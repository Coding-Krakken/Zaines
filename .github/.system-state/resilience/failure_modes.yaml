meta:
  id: canonical-failure-modes
  version: 1.0.0
  status: active
  owner: sre-engineer
  date: 2026-05-11

failure_modes:
  - id: FM-RR-001
    name: webhook_signature_verification_failed
    impact: no recognition mutation for the incoming event
    detection:
      - errorCode WEBHOOK_SIGNATURE_VERIFICATION_FAILED
    mitigation:
      - reject event with 400
      - preserve existing payment/recognition state

  - id: FM-RR-002
    name: duplicate_webhook_event
    impact: potential double-mutation of recognition amounts
    detection:
      - existing stripe_events.eventId already processed
    mitigation:
      - idempotent upsert by eventId
      - no-op when payment already in terminal state

  - id: FM-RR-003
    name: service_period_missing
    impact: transaction cannot be recognized on schedule
    detection:
      - servicePeriodStart or servicePeriodEnd null while method=service_period
    mitigation:
      - mark recognitionStatus as excluded
      - emit mismatch alert and remediation task

  - id: FM-RR-004
    name: report_generation_timeout
    impact: delayed finance reporting for close process
    detection:
      - API timeout or export failure
    mitigation:
      - retry with narrowed period window
      - fallback to cached summary for read-only views

rollback_triggers:
  - recognition_mismatch_rate_over_threshold
  - webhook_processing_failure_rate_over_threshold
  - finance_export_failure_spike

auth_failure_modes:
  - id: FM-AUTH-001
    name: provider_capability_mismatch
    impact: non-functional auth method could be rendered to users
    detection:
      - capability endpoint includes method but auth providers endpoint omits same provider
    mitigation:
      - render only capability enabled methods
      - block provider action when runtime provider unavailable

  - id: FM-AUTH-002
    name: credentials_bruteforce_attempt
    impact: repeated invalid password attempts against a known email
    detection:
      - route key auth_credentials_login receives repeated 401 responses from same ip or subject
    mitigation:
      - apply rate-limited response envelope
      - preserve support-safe public error copy

  - id: FM-AUTH-003
    name: magic_link_provider_outage
    impact: passwordless login path cannot dispatch verification link
    detection:
      - /api/auth/magic-link returns AUTH_PROVIDER_MISCONFIGURED or AUTH_TRANSIENT_FAILURE
    mitigation:
      - preserve credentials and oauth as fallback methods when enabled
      - log correlation id for support follow-up

  - id: FM-AUTH-004
    name: session_revocation_ownership_violation
    impact: one account could attempt to revoke another account's active session
    detection:
      - /api/auth/sessions delete returns Session not found for non-owned sessionId
    mitigation:
      - filter revocation lookup by authenticated userId and sessionId
      - return support-safe 404 without ownership disclosure

  - id: FM-AUTH-005
    name: suspicious_activity_signal_drift
    impact: dashboard may under-report or over-report risky sign-in events
    detection:
      - mismatch between loginActivity isSuspicious records and /api/auth/sessions activity payload
    mitigation:
      - centralize suspicious classification in auth security helpers
      - validate API and panel state parity with deterministic tests

  - id: FM-AUTH-006
    name: auth_runtime_config_semantic_drift
    impact: auth providers/session strategy may differ between runtime auth, capability rendering, and sessions API
    detection:
      - identical env toggles produce conflicting capability/session outputs across auth surfaces
    mitigation:
      - centralize toggle and strategy derivation in shared auth runtime config helper
      - enforce parity with runtime-config integration tests

  - id: FM-AUTH-007
    name: auth_provider_registry_order_drift
    impact: sign-in surfaces may flicker or mis-prioritize methods across deployments
    detection:
      - provider capabilities endpoint emits auth methods in non-deterministic order or without disabled reasons for static providers
    mitigation:
      - derive provider capabilities from a single ordered registry
      - lock ordering and static provider reasons with deterministic tests
