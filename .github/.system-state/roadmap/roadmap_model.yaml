meta:
  id: roadmap-model
  version: 1.0.0
  status: draft
  owner: program-manager
  date: 2026-05-13
  horizon: 12-weeks

program:
  name: zaines-stay-and-play-luxury-redesign
  release_mode: single-release-with-internal-gates

phases:
  - id: P0
    title: model-first-prerequisite-gate
    status: complete
    outputs:
      - delivery/delivery_state_model.yaml
      - perf/budgets.yaml
      - deps/dependency_policy.yaml
      - ci/pipeline_model.yaml
      - roadmap/roadmap_model.yaml
  - id: P1
    title: luxury-brand-system-rebuild
    status: complete
    primary_targets:
      - src/app/globals.css
      - tailwind.config.ts
      - src/components/motion.tsx
  - id: P2
    title: ia-and-seo-architecture-redesign
    status: complete
    primary_targets:
      - src/lib/seo.ts
      - src/lib/seo.data.ts
      - src/app/sitemap.ts
      - src/app/robots.ts
  - id: P3
    title: homepage-transformation
    status: complete
    primary_targets:
      - src/app/page.tsx
      - src/components/home/hero-section.tsx
      - src/components/home/suite-showcase.tsx
      - src/components/home/comparison-table.tsx
      - src/components/home/testimonials.tsx
      - src/components/home/trust-bar.tsx
  - id: P4
    title: marketing-ecosystem-redesign
    status: complete
  - id: P5
    title: booking-ux-rebuild
    status: complete
    critical_path: true
  - id: P6
    title: premium-customer-portal-completion
    status: complete
  - id: P7
    title: advanced-premium-systems
    status: complete
  - id: P8
    title: accessibility-hard-gate
    status: complete
    release_blocker: true
    delivered:
      - skip-link and main landmark (layout.tsx)
      - keyboard focus styles (site-header, footer, mobile-nav, user-nav, dashboard-nav)
      - aria-current stepper + sr-only step states
      - prefers-reduced-motion comprehensive CSS + framer-motion useReducedMotion
  - id: P9
    title: performance-hard-gate
    status: complete
    release_blocker: true
    delivered:
      - next/image optimisation config (avif/webp, deviceSizes)
      - dynamic() imports for DogModeExperience, CalmModeExperience, PhotoGallery
      - preconnect + dns-prefetch resource hints for Stripe/fonts
      - production build verified: 122 static routes, zero errors
  - id: P10
    title: content-production-track
    status: planned
    runs_parallel: true
  - id: P11
    title: final-qa-and-launch-orchestration
    status: in_progress
    release_blocker: true

release_gates:
  - gate: model-compliance
    required: true
  - gate: booking-critical-journey-pass
    required: true
  - gate: seo-integrity-pass
    required: true
  - gate: accessibility-certification
    required: true
  - gate: performance-budget-pass
    required: true
  - gate: rollback-rehearsal-pass
    required: true

tracking:
  weekly_control_loop:
    - dependency-risk-review
    - midweek-demo-and-blocker-burndown
    - gate-evidence-check
  owner_roles:
    accountable:
      - tech-lead
      - product-owner
      - quality-director
