meta:
  id: canonical-threat-model
  version: 1.0.0
  status: active
  owner: security-engineer
  date: 2026-05-11

scope:
  critical_routes:
    - /api/payments/create-intent
    - /api/payments/webhook
    - /api/admin/finance/revenue-recognition

trust_boundaries:
  - zone: browser-client
    level: untrusted
  - zone: nextjs-api-and-server-components
    level: trusted
  - zone: stripe-platform
    level: external-trusted-via-contract
  - zone: finance-report-exports
    level: restricted

attack_surfaces:
  - id: TM-RR-001
    surface: webhook payload processing
    risk: forged or replayed events modify recognition data
    severity: high
    mitigations:
      - Stripe signature verification required
      - event idempotency via unique eventId
      - processed flag and processedAt tracking

  - id: TM-RR-002
    surface: finance export endpoints
    risk: unauthorized access to accounting summaries
    severity: high
    mitigations:
      - staff/admin authorization checks
      - explicit route-level access validation
      - no PII beyond required business fields

  - id: TM-RR-003
    surface: structured logging
    risk: sensitive data leakage in logs
    severity: critical
    mitigations:
      - standardized redaction policy
      - forbidden cardholder fields in all logs
      - correlation-id based diagnostics only

security_invariants:
  - id: SEC-RR-001
    rule: Cardholder data must never be persisted in revenue recognition fields.
  - id: SEC-RR-002
    rule: All webhook mutations must be replay-safe.
  - id: SEC-RR-003
    rule: Revenue exports require authenticated staff/admin access.
