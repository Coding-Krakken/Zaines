name: Accessibility CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/audit/playwright_a11y.js'

jobs:
  accessibility:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.5
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Generate Prisma Client
        run: pnpm prisma generate
      
      - name: Build Next.js app
        run: pnpm build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          AUTH_SECRET: test-secret-for-ci
          NEXTAUTH_SECRET: test-secret-for-ci
          AUTH_URL: http://localhost:3000
          NEXTAUTH_URL: http://localhost:3000
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Start Next.js server
        run: pnpm start &
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          AUTH_SECRET: test-secret-for-ci
          NEXTAUTH_SECRET: test-secret-for-ci
          AUTH_URL: http://localhost:3000
          NEXTAUTH_URL: http://localhost:3000
          PORT: 3000
      
      - name: Wait for server to be ready
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 1; done'
      
      - name: Run accessibility scan
        run: node scripts/audit/playwright_a11y.js http://localhost:3000
      
      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-report
          path: docs/audit_logs/PLAYWRIGHT_A11Y.*
          retention-days: 30
      
      - name: Comment PR with results
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            
            let summary = '## 🔍 Accessibility Scan Results\n\n';
            
            try {
              const report = fs.readFileSync('docs/audit_logs/PLAYWRIGHT_A11Y.md', 'utf8');
              summary += report;
            } catch (error) {
              summary += '❌ Failed to read accessibility report\n';
              summary += `Error: ${error.message}`;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
